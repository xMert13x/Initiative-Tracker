<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Uncial Antiqua&display=swap" rel="stylesheet">
  <title>Roll For Initiative</title>
  <style>
    
    body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: rgba(0, 0, 0, 0.2); /* dark overlay */
  z-index: -1;
}

body {
  background-size: cover;       /* makes it fill the screen */
  background-position: center;  /* centers the image */
  background-attachment: fixed; /* stays in place when scrolling */
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif; /* fallback font for content */
}

/* === BACKGROUND THEMES === */

body.theme-default {
  background-image: url('images/background.png');
}

body.theme-dungeon {
  background-image: url('images/dungeon.jpeg');
}

body.theme-forest {
  background-image: url('images/forest.jpeg');
}

body.theme-arcane {
  background-image: url('images/arcane.jpeg');
}

body.theme-spooky {
  background-image: url('images/spooky.jpeg');
}
body.theme-hellfire {
  background-image: url('images/hellfire.jpeg');
}

body.theme-icy {
  background-image: url('images/icy.jpeg');
}

body.theme-townsquare {
  background-image: url('images/townsquare.jpeg');
}


    h1 {
  font-family: 'Uncial Antiqua', cursive;
  font-size: 100px; /* you can adjust */
  text-align: center;
  color: black; /* optional, gives a D&D feel */
  text-shadow: 2px 2px 4px white; /* adds depth */
  margin-top: 20px;
  margin-bottom: 0px;
}

.theme-selector {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1000;
}

#themeToggle {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 8px;
  background-color: #222;
  color: white;
  border: 1px solid #555;
  cursor: pointer;
}

#themeToggle:hover {
  background-color: #444;
}

.theme-menu {
  display: none;
  margin-top: 0px;
  background-color: rgba(0, 0, 0, 0.243);
  border: 1px solid #555;
  border-radius: 8px;
  overflow: hidden;
}

.theme-menu button {
  display: block;
  width: 100%;
  padding: 2.3px 12px;
  background: none;
  border: none;
  color: white;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
}

.theme-menu button:hover {
  background-color: rgba(255, 255, 255, 0.15);
}


.character-row {
  display: flex;
  justify-content: center;
  align-items: stretch;       /* characters fill full row height */
  gap: 0px;
  padding: 8px 20px 0;           /* gap between edges and characters */
  margin-bottom: 45px;
  overflow: visible;
}


.character-row .character {
  flex: 1 1 0;               /* grow/shrink evenly */
  display: flex;
  flex-direction: column;
  align-items: center;
}

.character img {
  width: 100%;
  max-height: 460px;
  object-fit: cover;
  border: 2px solid black;
}

.character {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;

  flex: 0 0 auto;
  max-width: 260px;
  max-height: 460px;

  padding: 8px;
  text-align: center;
  cursor: grab;
  touch-action: none;

  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.8),
    rgba(220,220,220,0.6)
  );
  border: 3px solid #444;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.5);
  transition: transform 0.2s, box-shadow 0.2s, filter 0.3s;
}

.fullscreen .character-row {
  display: flex;
  justify-content: center;    /* horizontal centering */
  align-items: center;        /* vertical centering */
  min-height: 100vh;          /* full viewport height */
  margin-bottom: 0;           /* remove extra margin */
}


.character {
  filter: brightness(0.75) saturate(0.8);
  transition: filter 0.3s ease, transform 0.3s ease;
}

.character:not(.active) {
  filter: brightness(0.75) saturate(0.8) blur(0.5px);
}


.character p {
  margin: 6px 0 4px;
  font-family: 'Uncial Antiqua', cursive;
  font-size: 30px;
  font-weight: bold;
  letter-spacing: 1px;
  color: #111;
  text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.6);
   font-size: clamp(14px, 2vw, 30px);
  line-height: 2.0;
}

.character.active {
  background: linear-gradient(
    180deg,
    rgba(255, 215, 0, 0.35),
    rgba(255, 255, 255, 0.6)
  );
  border-color: gold;
  box-shadow:
    0 0 12px rgba(255, 215, 0, 0.8),
    0 0 25px rgba(255, 215, 0, 0.6),
    0 0 45px rgba(255, 215, 0, 0.4);
  animation: heroicGlow 1.8s ease-in-out infinite;
}

.character.active {
  filter: brightness(1.1) saturate(1.2);
  transform: translateY(-4px);
}


@keyframes heroicGlow {
  0% {
    box-shadow:
      0 0 12px rgba(255, 215, 0, 0.6),
      0 0 25px rgba(255, 215, 0, 0.4),
      0 0 45px rgba(255, 215, 0, 0.2);
  }
  50% {
    box-shadow:
      0 0 16px rgba(255, 215, 0, 0.9),
      0 0 35px rgba(255, 215, 0, 0.7),
      0 0 65px rgba(255, 215, 0, 0.5);
  }
  100% {
    box-shadow:
      0 0 12px rgba(255, 215, 0, 0.6),
      0 0 25px rgba(255, 215, 0, 0.4),
      0 0 45px rgba(255, 215, 0, 0.2);
  }
}

.character:active {
  cursor: grabbing;
}
.add-character {
  display: flex;
  justify-content: center;   /* centers horizontally */
  gap: 15px;                 /* space between inputs and button */
  margin: 20px 0;            /* spacing from other content */
  flex-wrap: wrap;           /* ensures responsiveness on smaller screens */
}

.add-character input,
.add-character button {
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #444;
  background-color: #222;
  color: white;
  outline: none;
}

.add-character input:focus {
  border-color: #888;
}

.add-character button {
  cursor: pointer;
  border: none;
  background-color: #444;
  transition: background-color 0.2s;
}

.add-character button:hover {
  background-color: #666;
}

.character:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.7);
}

.delete-btn:hover {
  background: radial-gradient(circle at top left, #f00, #800);
  transform: scale(1.1);
}

.delete-btn:active {
  transform: scale(0.95);
}

.delete-tab {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  width: 52px;
  height: 28px;

  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease 0.25s, transform 0.25s ease 0.25s;
}

.character:hover .delete-tab {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}

.delete-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: radial-gradient(circle at top, #aa0000, #550000);
  color: white;
  border: 2px solid black;
  cursor: pointer;
  font-size: 50px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

.delete-btn .skull {
  display: inline-block;
  transform: translateY(-4.5px); /* adjust visually */
}


.delete-btn:hover {
  background: radial-gradient(circle at top, #ff3333, #880000);
  transform: scale(1.1);
}

.character::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -10px;
  height: 10px;
}

.controls {
  display: flex;
  justify-content: center;   /* centers horizontally */
  gap: 15px;                 /* space between buttons */
  margin: 55px 0 5px 0;            /* spacing from other content */
  
}
.controls button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background-color: #444;
  color: white;
  transition: background-color 0.2s;
  
}

.controls button:hover {
  background-color: #666;
}

body.fullscreen .controls {
  display: flex;
  justify-content: center;    /* center horizontally */
  gap: 15px;
  position: fixed;
  bottom: 130px;               /* spacing from bottom */
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;              /* ensure they stay above characters */
}

/* Fullscreen character row should stay centered, but below controls */
body.fullscreen .character-row {
  min-height: calc(100vh - 0px); /* leave space for controls */
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 0;
  z-index: 1000; /* behind controls */
}
/* Hide non-essential buttons in fullscreen */
body.fullscreen .controls button:not(#nextTurnBtn):not(#fullscreenBtn) {
  display: none;
}

/* Hide header, theme selector, and add-character in fullscreen */
body.fullscreen h1,
body.fullscreen .theme-selector,
body.fullscreen .add-character,
body.fullscreen .mute-btn {
  display: none;
}


body.fullscreen .controls button,
body.fullscreen .add-character,
body.fullscreen h1 {
  display: none;
}

/* Fullscreen controls buttons */
body.fullscreen .controls button#nextTurnBtn,
body.fullscreen .controls button#fullscreenBtn {
  display: inline-block;
  min-width: 120px; /* ensures text doesn’t wrap */
  white-space: nowrap; /* prevent breaking text into two lines */
  padding: 10px 20px; /* optional: adjust for aesthetics */
  text-align: center;
}
/* Hide cursor when inactive in fullscreen */
body.fullscreen.cursor-hidden {
  cursor: none;
}

.character p {
  margin: 6px 0 4px;
  font-family: 'Uncial Antiqua', cursive;
  font-weight: bold;
  letter-spacing: 1px;
  color: #111;
  text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.6);

  font-size: clamp(14px, 2vw, 30px); /* responsive size */
  line-height: 1.2;

  white-space: nowrap;   /* prevent line breaks */
  overflow: hidden;
  text-overflow: ellipsis; /* optional: show "..." if it overflows */
}

.tooltip-wrapper {
  position: relative;
  display: inline-block;
}

.tooltip-text {
  position: absolute;
  bottom: 125%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  white-space: nowrap;

  opacity: 0;
  visibility: hidden;
  pointer-events: none;

  transition: opacity 0.15s ease;
  z-index: 3000;
}

.tooltip-wrapper:hover .tooltip-text {
  opacity: 1;
  visibility: visible;
}

/* Mute button tooltip (top-right corner) */
.tooltip-wrapper.mute-btn-wrapper {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10000;
  display: inline-block;
}

.tooltip-wrapper.mute-btn-wrapper .tooltip-text {
  visibility: hidden;
  width: 160px;
  background-color: rgba(0,0,0,0.8);
  color: white;
  text-align: center;
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 14px;

  position: absolute;
  top: 100%;      /* BELOW the button */
  right: 0;
  margin-top: 50px;
  margin-left: -80px;
  opacity: 0;
  transition: opacity 0.2s;
}

.tooltip-wrapper.mute-btn-wrapper:hover .tooltip-text {
  visibility: visible;
  opacity: 1;
}


.mute-btn {
  position: fixed;      /* keep it fixed relative to viewport */
  top: 20px;
  right: 20px;
  z-index: 9999;        /* above everything */
  
  padding: 8px 14px;
  font-size: 14px;

  background: rgba(20, 20, 20, 0.85);
  color: #f5f0e6;
  border: 1px solid #555;
  border-radius: 6px;

  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.2s ease, transform 0.15s ease;
}

.mute-btn:hover {
  background: rgba(40, 40, 40, 0.95);
  transform: scale(1.05);
}

/* NO need to touch display in fullscreen */

/* Top-right container */
.mute-wrapper {
  position: fixed;
  top: 50px;
  right: 100px;
  z-index: 5000;
}

/* Prevent flex squashing */
.mute-wrapper .tooltip-wrapper {
  display: inline-block;
  width: auto;
}

/* Ensure button keeps its size */
.mute-btn {
  white-space: nowrap;
  min-width: 44px;
  padding: 12px 20px;
}
.mute-wrapper .tooltip-text {
  top: 250%;
  bottom: auto;
  left: 100%;
  transform: translateX(-50%);
}


</style>


</head>
<body class="theme-default" tabindex="0">

<div class="theme-selector">
  <button id="themeToggle">Theme ▾</button>
  <div class="theme-menu" id="themeMenu">
    <button onclick="setTheme('default')">Default</button>
    <button onclick="setTheme('dungeon')">Dungeon</button>
    <button onclick="setTheme('forest')">Forest</button>
    <button onclick="setTheme('arcane')">Arcane</button>
    <button onclick="setTheme('spooky')">Spooky</button>
    <button onclick="setTheme('hellfire')">Hellfire</button>
    <button onclick="setTheme('icy')">Icy</button>
    <button onclick="setTheme('townsquare')">Townsquare</button>
  </div>
</div>


<h1>Roll For Initiative</h1>

<div class="add-character">
  <input type="text" id="charName" placeholder="Character Name">
  <input type="file" id="charImage" accept="image/*">
  <button onclick="addCharacter()">Add Character</button>
</div>

<div class="character-row" id="characterRow">
  <!-- Characters will appear here -->
</div>

<div class="controls">

  <div class="tooltip-wrapper control-btn-wrapper">
    <button id="nextTurnBtn">Next Turn</button>
    <span class="tooltip-text">Press N for Next Turn</span>
  </div>

  <div class="tooltip-wrapper">
    <button id="fullscreenBtn">Fullscreen</button>
    <span class="tooltip-text">Press F for Fullscreen</span>
  </div>

  <button id="resetBtn">Reset</button>
  <button id="saveBtn">Save to File</button>
  <button id="loadBtn">Load from File</button>

</div>

<div class="mute-wrapper">
  <div class="tooltip-wrapper mute-btn-wrapper">
    <button id="muteBtn" class="mute-btn">🔊</button>
    <span class="tooltip-text">Press M to Toggle Sound</span>
  </div>
</div>

<input
  type="file"
  id="loadFileInput"
  accept=".json"
  style="display:none"
  onchange="loadFromFile(event)">


<audio id="turnSound" preload="auto">
  <source src="sounds/turn.mp3" type="audio/wav">
</audio>

<script>

  let touchDraggingIndex = null;

let characters = [];
  let currentTurn = 0;
  let draggedIndex = null;

  const row = document.getElementById("characterRow");

function saveGame() {
  const saveData = {
    characters: characters,
    currentTurn: currentTurn
  };

  localStorage.setItem(
    "initiativeTrackerSave",
    JSON.stringify(saveData)
  );
}
function saveToFile() {
  if (characters.length === 0) {
    alert("No characters to save.");
    return;
  }

  const defaultName = "roll-for-initiative-save";
  const name = prompt("Name your save file:", defaultName);

  if (!name) return; // user cancelled

  const saveData = {
    characters,
    currentTurn,
    version: 1
  };

  const blob = new Blob(
    [JSON.stringify(saveData, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `${name.replace(/[^a-z0-9-_ ]/gi, "_")}.json`;

  document.body.appendChild(a);
  a.click();

  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderCharacters() {
  row.innerHTML = "";

  if (currentTurn >= characters.length) currentTurn = 0;

  // Calculate max width per character
 const maxWidthPerCharacter = Math.min(
  (window.innerWidth - 40 - 10 * (characters.length - 1)) / characters.length, // width based on number of characters
  250 // maximum width per character
);

  // Set height proportional to width (for uniform display boxes)
const isFullscreen = document.fullscreenElement !== null;

const maxHeight = Math.max(
  Math.min(
    maxWidthPerCharacter * (isFullscreen ? 1.8 : 1.5), // sensible taller height
    isFullscreen ? 460 : 400                           // max height cap
  ),
  150 // min height
);


  characters.forEach((character, index) => {
    const div = document.createElement("div");
    div.className = "character";
    if (index === currentTurn) div.classList.add("active");
    div.draggable = true;

    div.innerHTML = `
<img src="${character.image}" style="height:${maxHeight}px; max-width:${maxWidthPerCharacter}px; object-fit: cover;">

      <p><strong>${character.name}</strong></p>
  <div class="delete-tab">
  <button class="delete-btn"><span class="skull">☠</span></button>

</div>


    `;

    // Drag & drop
    div.addEventListener("dragstart", () => draggedIndex = index);
    div.addEventListener("dragover", (event) => event.preventDefault());
    div.addEventListener("drop", () => {
      if (draggedIndex === null || draggedIndex === index) return;
      const moved = characters.splice(draggedIndex, 1)[0];
      characters.splice(index, 0, moved);
      draggedIndex = null;
      currentTurn = 0;
      saveGame();
      renderCharacters();
      
    });

    // ===== TOUCH SUPPORT (iOS / iPad) =====
div.addEventListener("pointerdown", (e) => {
  if (e.pointerType !== "touch") return;

  touchDraggingIndex = index;
  div.setPointerCapture(e.pointerId);
});

div.addEventListener("pointerenter", () => {
  if (touchDraggingIndex === null) return;
  if (touchDraggingIndex === index) return;

  const moved = characters.splice(touchDraggingIndex, 1)[0];
  characters.splice(index, 0, moved);
  touchDraggingIndex = index;

  saveGame();
  renderCharacters();
});

div.addEventListener("pointerup", () => {
  touchDraggingIndex = null;
});


    // Delete button
    div.querySelector(".delete-btn").addEventListener("click", () => {
      characters.splice(index, 1);
      currentTurn = 0;
      saveGame();
      renderCharacters();
    });

    row.appendChild(div);
  });
}

function nextTurn() {
  if (characters.length === 0) return;

  currentTurn++;

  if (currentTurn >= characters.length) {
    currentTurn = 0;
  }

  playTurnSound(); // 🔊 sound feedback

  saveGame();
  renderCharacters();
}


document.addEventListener("keydown", (event) => {
  // Ignore if typing in an input or file picker
  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA") return;
    // Optional: N key → Next Turn
  if (event.key.toLowerCase() === "n") {
    nextTurn();
  }
});

function addCharacter() {
  const nameInput = document.getElementById("charName");
  const imageInput = document.getElementById("charImage");

  const name = nameInput.value.trim();
  const file = imageInput.files[0];

  if (!name || !file) {
    alert("Please enter a name and select an image.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function () {
    // Create an image element to load the file
    const img = new Image();
    img.onload = function () {
      const canvas = document.createElement("canvas");
      const maxSize = 500; // maximum width or height
      let width = img.width;
      let height = img.height;

      // Scale proportionally
      if (width > height) {
        if (width > maxSize) {
          height = (height * maxSize) / width;
          width = maxSize;
        }
      } else {
        if (height > maxSize) {
          width = (width * maxSize) / height;
          height = maxSize;
        }
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      // Get the resized image as base64
      const resizedData = canvas.toDataURL("image/png");

      // Add the character to the array
      characters.push({
        name: name,
        image: resizedData
      });

      currentTurn = 0;

      saveGame();
      renderCharacters();

      // Clear inputs
      nameInput.value = "";
      imageInput.value = "";
    };

    img.src = reader.result;
  };

  reader.readAsDataURL(file);
}




function loadGame() {
  const savedData = localStorage.getItem("initiativeTrackerSave");

  if (!savedData) {
    characters = [];
    currentTurn = 0;
    return;
  }

  const saveData = JSON.parse(savedData);
  characters = saveData.characters || [];
  currentTurn = saveData.currentTurn || 0;
}

function loadTheme() {
  const savedTheme = localStorage.getItem("initiativeTheme");
  if (savedTheme) {
    document.body.className = `theme-${savedTheme}`;
  }
}


function loadFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function () {
    try {
      const data = JSON.parse(reader.result);

      if (!Array.isArray(data.characters)) {
        alert("Invalid save file.");
        return;
      }

      characters = data.characters;
      currentTurn = data.currentTurn || 0;

      saveGame();       // optional: sync to localStorage
      renderCharacters();
    } catch (e) {
      alert("Failed to load save file.");
    }
  };

  reader.readAsText(file);

  // reset input so the same file can be loaded again
  event.target.value = "";
}


function resetTracker() {
  if (!confirm("Are you sure you want to reset the tracker? This will remove all characters.")) {
    return; // cancel if user clicks "Cancel"
  }

  characters = [];
  currentTurn = 0;
  localStorage.removeItem("initiativeTrackerSave"); // clear saved game
  renderCharacters(); // update the UI
}

loadGame();
renderCharacters();

const themeToggle = document.getElementById("themeToggle");
const themeMenu = document.getElementById("themeMenu");

themeToggle.addEventListener("click", () => {
  themeMenu.style.display =
    themeMenu.style.display === "block" ? "none" : "block";
});

function setTheme(theme) {
  document.body.className = `theme-${theme}`;
  localStorage.setItem("initiativeTheme", theme);
  themeMenu.style.display = "none";
}

loadTheme();

document.addEventListener("click", (event) => {
  const themeSelector = document.querySelector(".theme-selector");

  if (!themeSelector.contains(event.target)) {
    themeMenu.style.display = "none";
  }
});

function toggleFullscreen() {
  const elem = document.documentElement;

  if (!document.fullscreenElement) {
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) { // Safari
      elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { // IE11
      elem.msRequestFullscreen();
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    }
  }
}

// Load saved theme
const savedTheme = localStorage.getItem("initiativeTheme") || "default";
document.body.className = `theme-${savedTheme}`;


window.addEventListener("resize", renderCharacters);

function playTurnSound() {
  if (soundMuted) return;

  turnSound.currentTime = 0;
  turnSound.play().catch(() => {});
}

const turnSound = new Audio("sounds/turn.mp3");
turnSound.volume = 0.1;
turnSound.preload = "auto";

let soundMuted = localStorage.getItem("soundMuted") === "true";

function toggleMute() {
  soundMuted = !soundMuted;
  localStorage.setItem("soundMuted", soundMuted);

  updateMuteButton();
}

function updateMuteButton() {
  const btn = document.getElementById("muteBtn");
  if (!btn) return;

  btn.textContent = soundMuted ? "🔇" : "🔊 ";
}

const muteBtn = document.getElementById("muteBtn");
if (muteBtn) {
  muteBtn.addEventListener("click", toggleMute);
}

updateMuteButton();

// Keyboard shortcut: press "M" to toggle mute
document.addEventListener("keydown", (event) => {
  // Ignore typing in inputs
  if (event.target.tagName === "INPUT" || event.target.tagName === "TEXTAREA") return;

  if (event.key.toLowerCase() === "m") {
    toggleMute();
  }
   // F key → Toggle Fullscreen
  if (event.key.toLowerCase() === "f") {
    toggleFullscreen();
  }
});

let cursorTimeout = null;
const CURSOR_HIDE_DELAY = 1000; // 1 second

function resetCursorTimer() {
  if (!document.body.classList.contains("fullscreen")) return;

  // Show cursor immediately
  document.body.classList.remove("cursor-hidden");

  // Clear previous timer
  if (cursorTimeout) clearTimeout(cursorTimeout);

  // Start new timer
  cursorTimeout = setTimeout(() => {
    document.body.classList.add("cursor-hidden");
  }, CURSOR_HIDE_DELAY);
}

// Mouse movement brings cursor back
document.addEventListener("mousemove", resetCursorTimer);
document.addEventListener("mousedown", resetCursorTimer);


document.addEventListener("fullscreenchange", () => {
  const isFullscreen = !!document.fullscreenElement;

  // Toggle fullscreen class for CSS
  document.body.classList.toggle("fullscreen", isFullscreen);

  // Recalculate character layout
  renderCharacters();

  if (isFullscreen) {
    // Start cursor hide timer
    resetCursorTimer();
  } else {
    // Restore cursor and keyboard control
    document.body.classList.remove("cursor-hidden");
    if (cursorTimeout) clearTimeout(cursorTimeout);

    // Restore keyboard focus so shortcuts work immediately
    document.body.focus();
  }
});

document.getElementById("nextTurnBtn").addEventListener("click", nextTurn);
document.getElementById("fullscreenBtn").addEventListener("click", toggleFullscreen);
document.getElementById("resetBtn").addEventListener("click", resetTracker);
document.getElementById("saveBtn").addEventListener("click", saveToFile);

document.getElementById("loadBtn").addEventListener("click", () => {
  document.getElementById("loadFileInput").click();
});

</script>
