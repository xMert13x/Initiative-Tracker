<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Uncial Antiqua&display=swap" rel="stylesheet">
  <title>Roll For Initiative</title>
  <style>
    body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: rgba(0, 0, 0, 0.8); /* dark overlay */
  z-index: -1;
}

    body {
  background-image: url('images/background.png');
  background-size: cover;       /* makes it fill the screen */
  background-position: center;  /* centers the image */
  background-attachment: fixed; /* stays in place when scrolling */
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif; /* fallback font for content */
}
    h1 {
  font-family: 'Uncial Antiqua', cursive;
  font-size: 100px; /* you can adjust */
  text-align: center;
  color: black; /* optional, gives a D&D feel */
  text-shadow: 2px 2px 4px white; /* adds depth */
  margin-bottom: 20px;
}
.character-row {
  display: flex;
  justify-content: center;
  align-items: stretch;       /* characters fill full row height */
  gap: 0px;
  padding: 0 20px;           /* gap between edges and characters */
  overflow: hidden;
}

.character-row .character {
  flex: 1 1 0;               /* grow/shrink evenly */
  display: flex;
  flex-direction: column;
  align-items: center;
}

.character-row .character img {
  width: 100%;               /* fill the width of the container */
  object-fit: cover;         /* fills box, crops if necessary */
  border-radius: 8px;
}
.character {
  display: flex;
  flex-direction: column;
  align-items: center;

  flex: 0 0 auto;          /* 🚫 DO NOT grow to fill row */
  max-width: 260px;        /* prevents giant boxes */
}

  .character {
    text-align: center;
      padding: 5px;
  border: 1px solid black;
  background-color: rgba(255, 255, 255, 0.642);
}
   body.fullscreen .controls,
    body.fullscreen .add-character {
      display: none;
    }
.character img {
  width: 120px;  /* bigger than before */
  height: 300px; /* keep square */
  border: 2px solid black;
  border-radius: 0px;
  object-fit: cover; /* ensures image fills the box nicely */
 max-height: 460px;
  transition: height 0.3s ease;
}


.character.active {
  background-color: gold;
}
.character {
  cursor: grab;
}

.character:active {
  cursor: grabbing;
}
.add-character {
  display: flex;
  justify-content: center;   /* centers horizontally */
  gap: 15px;                 /* space between inputs and button */
  margin: 20px 0;            /* spacing from other content */
  flex-wrap: wrap;           /* ensures responsiveness on smaller screens */
}

.add-character input,
.add-character button {
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #444;
  background-color: #222;
  color: white;
  outline: none;
}

.add-character input:focus {
  border-color: #888;
}

.add-character button {
  cursor: pointer;
  border: none;
  background-color: #444;
  transition: background-color 0.2s;
}

.add-character button:hover {
  background-color: #666;
}

.delete-btn {
  background-color: darkred;
  color: white;
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-weight: bold;
  margin-top: 5px;
}

.delete-btn:hover {
  background-color: red;
}
.controls {
  display: flex;
  justify-content: center;   /* centers horizontally */
  gap: 15px;                 /* space between buttons */
  margin: 20px 0;            /* spacing from other content */
}
.controls button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background-color: #444;
  color: white;
  transition: background-color 0.2s;
}

.controls button:hover {
  background-color: #666;
}



</style>


</head>
<body>

<h1>Roll For Initiative</h1>

<div class="add-character">
  <input type="text" id="charName" placeholder="Character Name">
  <input type="file" id="charImage" accept="image/*">
  <button onclick="addCharacter()">Add Character</button>
</div>

<div class="character-row" id="characterRow">
  <!-- Characters will appear here -->
</div>

<script>
let characters = [];
  let currentTurn = 0;
  let draggedIndex = null;

  const row = document.getElementById("characterRow");

function saveGame() {
  const saveData = {
    characters: characters,
    currentTurn: currentTurn
  };

  localStorage.setItem(
    "initiativeTrackerSave",
    JSON.stringify(saveData)
  );
}


function renderCharacters() {
  row.innerHTML = "";

  if (currentTurn >= characters.length) currentTurn = 0;

  const screenWidth = window.innerWidth;
  const screenPadding = 40; // 20px left + 20px right
  const gap = 10 * (characters.length - 1); // total gaps between portraits

  // Calculate max width per character
 const maxWidthPerCharacter = Math.min(
  (window.innerWidth - 40 - 10 * (characters.length - 1)) / characters.length, // width based on number of characters
  250 // maximum width per character
);

  // Set height proportional to width (for uniform display boxes)
const isFullscreen = document.fullscreenElement !== null;

const maxHeight = Math.max(
  Math.min(
    maxWidthPerCharacter * (isFullscreen ? 1.8 : 1.5), // sensible taller height
    isFullscreen ? 460 : 400                           // max height cap
  ),
  150   
                                                   // min height
);





  characters.forEach((character, index) => {
    const div = document.createElement("div");
    div.className = "character";
    if (index === currentTurn) div.classList.add("active");
    div.draggable = true;

    div.innerHTML = `
<img src="${character.image}" style="height:${maxHeight}px; max-width:${maxWidthPerCharacter}px; object-fit: cover;">

      <p><strong>${character.name}</strong></p>
      <button class="delete-btn">✖</button>
    `;

    // Drag & drop
    div.addEventListener("dragstart", () => draggedIndex = index);
    div.addEventListener("dragover", (event) => event.preventDefault());
    div.addEventListener("drop", () => {
      if (draggedIndex === null || draggedIndex === index) return;
      const moved = characters.splice(draggedIndex, 1)[0];
      characters.splice(index, 0, moved);
      draggedIndex = null;
      currentTurn = 0;
      saveGame();
      renderCharacters();
    });

    // Delete button
    div.querySelector(".delete-btn").addEventListener("click", () => {
      characters.splice(index, 1);
      currentTurn = 0;
      saveGame();
      renderCharacters();
    });

    row.appendChild(div);
  });
}



  

function nextTurn() {
  if (characters.length === 0) return;

  currentTurn++;

  if (currentTurn >= characters.length) {
    currentTurn = 0;
  }
  saveGame();
  renderCharacters();
}



function addCharacter() {
  const nameInput = document.getElementById("charName");
  const imageInput = document.getElementById("charImage");

  const name = nameInput.value.trim();
  const file = imageInput.files[0];

  if (!name || !file) {
    alert("Please enter a name and select an image.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function () {
    // Create an image element to load the file
    const img = new Image();
    img.onload = function () {
      const canvas = document.createElement("canvas");
      const maxSize = 500; // maximum width or height
      let width = img.width;
      let height = img.height;

      // Scale proportionally
      if (width > height) {
        if (width > maxSize) {
          height = (height * maxSize) / width;
          width = maxSize;
        }
      } else {
        if (height > maxSize) {
          width = (width * maxSize) / height;
          height = maxSize;
        }
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      // Get the resized image as base64
      const resizedData = canvas.toDataURL("image/png");

      // Add the character to the array
      characters.push({
        name: name,
        image: resizedData
      });

      currentTurn = 0;

      saveGame();
      renderCharacters();

      // Clear inputs
      nameInput.value = "";
      imageInput.value = "";
    };

    img.src = reader.result;
  };

  reader.readAsDataURL(file);
}




function loadGame() {
  const savedData = localStorage.getItem("initiativeTrackerSave");

  if (!savedData) {
    characters = [];
    currentTurn = 0;
    return;
  }

  const saveData = JSON.parse(savedData);
  characters = saveData.characters || [];
  currentTurn = saveData.currentTurn || 0;
}

function resetTracker() {
  if (!confirm("Are you sure you want to reset the tracker? This will remove all characters.")) {
    return; // cancel if user clicks "Cancel"
  }

  characters = [];
  currentTurn = 0;
  localStorage.removeItem("initiativeTrackerSave"); // clear saved game
  renderCharacters(); // update the UI
}
function toggleFullscreen() {
  const elem = document.documentElement;

  if (!document.fullscreenElement) {
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) { // Safari
      elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { // IE11 (rare)
      elem.msRequestFullscreen();
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    }
  }
}

loadGame();
renderCharacters();

window.addEventListener("resize", renderCharacters);
document.addEventListener("fullscreenchange", renderCharacters);

</script>
<div class="controls">
  <button onclick="nextTurn()">Next Turn</button>
   <button onclick="toggleFullscreen()">Fullscreen</button>
   <button onclick="resetTracker()">Reset</button>
  

</div>

</body>
</html>
